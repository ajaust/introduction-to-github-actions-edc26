name: Workflow of exercise 1
run-name: First workflow # Optional


# Events triggering the workflow
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# Group of jobs to run as part of the workflow
jobs:
  ubuntu_job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello, I'm ubuntu-latest"
  macos_job:
    runs-on: macos-latest
    steps:
      - run: echo "Hello, I'm macos-latest"
  slow_job:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: echo "Hello, I'm a slow job"
      - run: sleep 30
  waiting_job:
    runs-on: ubuntu-latest
    needs: slow_job
    steps:
      - uses: actions/checkout@v3
      - run: ls -l
