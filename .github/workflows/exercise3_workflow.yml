name: Workflow of exercise 3
run-name: Third workflow


# Events triggering the workflow
on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ubuntu_job:
    runs-on: ubuntu-latest
    steps:
      - run: |
            echo ${{ secrets.GITHUB_TOKEN }}
            echo ${{ secrets.TEST_TOKEN }}
      - name: Print hello if TEST_TOKEN matches
        if: ${{ env.TEST_TOKEN == 'this_is_a_test_token' }}
        env:
          TEST_TOKEN: ${{ secrets.TEST_TOKEN }}
        run: echo "This is crazy"