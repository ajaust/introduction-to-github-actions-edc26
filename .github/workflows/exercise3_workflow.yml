name: exercise3_workflow
run-name: Exercise 3 workflow # Optional

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  emi_job:
    name: Elsa job
    runs-on: ubuntu-latest
    env:
      JobVariable: "This is JobVariable"
      MySecret: ${{ secrets.CAT }}

    steps:
      - run: echo "The secret value is ${{ env.MySecret }}"
      - run: echo "The token value is ${{ secrets.GITHUB_TOKEN }}"

      - run: echo "This step only runs if the secret value is 'alice'"
        if: ${{ env.MySecret == 'alice' }}

