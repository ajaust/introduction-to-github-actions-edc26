name: Workflow of exercise 2
run-name: Next workflow # Optional

# Events triggering the workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:



# Group of jobs to run as part of the workflow
jobs:
  ubuntu_job:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Hello I am Ubuntu latest"
  mac_job:
    runs-on: macos-latest
    steps:
      - run: echo "Hello I am MacOS latest"
  slow_job:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 120
      - run: echo "Hello I am a slow job"
      - run: timeout 60s
  waiting_job:
    runs-on: ubuntu-latest
    needs: slow_job
    steps:
      - run: command ls -l